# Fly.io configuration
# Deploy from repo root: fly deploy --dockerfile backend/Dockerfile --dockerignore-from-gitignore

app = "portfolion"
primary_region = "nrt"  # Tokyo (closest to Korea)

[build]
  dockerfile = "backend/Dockerfile"
  dockerignore_from_gitignore = false
  ignorefile = "backend/.dockerignore"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
